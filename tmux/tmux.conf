
# window numbering from 1
set -g base-index 1
set -g pane-base-index 1

set -g mouse on
set -g history-limit 100000

unbind C-b
set -g prefix C-space 

unbind '"'
bind \\ split-window -h

unbind '%'
bind - split-window -v

unbind Up
unbind Down
unbind Left
unbind Right

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind z
bind m resize-pane -Z

# vim like copy mode
set -g mode-keys vi

# Ctrl+Shift+C to copy selection to system clipboard
bind -n C-S-c if-shell 'tmux show-option -gqv @clipboard_program' \
  'send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"' \
  'send-keys -X copy-pipe-and-cancel "wl-copy"'

# Ctrl+Shift+V to paste from system clipboard
bind -n C-S-v if-shell 'tmux show-option -gqv @clipboard_program' \
  'run-shell "xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer"' \
  'run-shell "wl-paste | tmux load-buffer - && tmux paste-buffer"'
